name: tests
on:
  push: { branches: [main] }
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e ".[dev]"
      # the full suite skips real-embedder tests when sentence-transformers is absent;
      # install it so separability invariants are enforced in CI too
      - run: pip install sentence-transformers
      # exercise the integration adapters against the real libraries
      - run: pip install litellm langchain-core mcp
      - run: pytest -q
